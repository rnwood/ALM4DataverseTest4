name: DEPLOY-main
run-name: ${{ github.event_name == 'workflow_dispatch' && format('Deploy {0} <- {1}', github.event.inputs['target-environment'] || 'auto', github.event.inputs['build-run-name'] || format('latest from {0}', github.ref_name)) || format('Deploy auto <- run {0}', github.run_id) }}

# Stage-per-environment deployment workflow (generated by setup-github.ps1).
#
# To add another environment later:
#   1. Add it to workflow_dispatch target-environment options.
#   2. Add a deploy-* job and chain needs to the previous stage.
#   3. Set previous-environment-name to the previous stage short name.
#   4. In environment-approval mode, keep the repository_dispatch trigger enabled.

permissions:
  actions: read
  contents: write
  id-token: write

on:
  repository_dispatch:
    types: ['alm4dataverse-build-deploy-main']
  workflow_dispatch:
    inputs:
      build-run-name:
        description: 'Optional exact BUILD name to deploy. Leave blank to use the latest successful BUILD from this branch. Numeric run IDs also work.'
        required: false
        type: string
      target-environment:
        description: 'Optional target environment. Leave blank to start from the first configured stage. Valid values: prod.'
        required: false
        type: string

jobs:
  deploy-prod:
    # First stage in the chain.
    uses: rnwood/ALM4DataverseTest4Shared/.github/workflows/deploy.yml@main
    permissions:
      actions: read
      contents: write
      id-token: write
    with:
      environment-name: 'prod'
      previous-environment-name: ''
      promotion-mode: environment-approval
      trigger-branch: 'main'
      github-context-json: ${{ toJSON(github) }}
      caller-inputs-json: ${{ toJSON(inputs) }}
      timeout-minutes: 360
    secrets: inherit
