name: EXPORT

# Manually triggered: exports Dataverse solutions from your development environment
# and commits the unpacked changes back to this branch.
#
# See docs/usage/exporting-changes.md and docs/setup/github-setup.md

run-name: Export ${{ github.ref_name }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      commit-message:
        description: 'Commit message for the exported changes'
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  actions: write

jobs:
  export:
    uses: rnwood/ALM4DataverseTest4Shared/.github/workflows/export.yml@main
    permissions:
      contents: write
      id-token: write
      actions: write
    with:
      commit-message: ${{ inputs.commit-message }}
      timeout-minutes: 360

    secrets: inherit
